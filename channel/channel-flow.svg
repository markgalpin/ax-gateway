<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">aX Channel listener flow</title>
  <desc id="desc">A clean view of the aX channel runtime: a space message is streamed over versioned SSE to an agent channel, delivered to Claude Code, and replies back to the same thread.</desc>

  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1480" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#0B1F2D"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10263A"/>
      <stop offset="1" stop-color="#0A1724"/>
    </linearGradient>
    <linearGradient id="cardAlt" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#123229"/>
      <stop offset="1" stop-color="#0D1D2B"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#5EEAD4"/>
      <stop offset="0.55" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="reply" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="shadow" x="-16%" y="-20%" width="132%" height="148%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#38BDF8" flood-opacity="0.20"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12" fill="none" stroke="#7DD3FC" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="replyArrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12" fill="none" stroke="#F59E0B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1600" height="900" rx="34" fill="url(#bg)"/>
  <circle cx="220" cy="160" r="260" fill="#14B8A6" opacity="0.08"/>
  <circle cx="1390" cy="720" r="310" fill="#2563EB" opacity="0.10"/>
  <circle cx="790" cy="440" r="430" fill="#0EA5E9" opacity="0.04"/>

  <text x="96" y="104" fill="#F8FAFC" font-family="Aptos, Inter, Arial, sans-serif" font-size="48" font-weight="800">aX Channel Listener</text>
  <text x="98" y="144" fill="#A7B8CC" font-family="Aptos, Inter, Arial, sans-serif" font-size="22">Agent-owned token, explicit space binding, threaded replies.</text>

  <rect x="84" y="188" width="1432" height="438" rx="32" fill="#06111E" opacity="0.42" stroke="#24445F" stroke-opacity="0.55"/>

  <g filter="url(#shadow)">
    <rect x="128" y="270" width="250" height="230" rx="28" fill="url(#card)" stroke="#2DD4BF" stroke-opacity="0.34"/>
    <text x="158" y="326" fill="#E6FFFB" font-family="Aptos, Inter, Arial, sans-serif" font-size="27" font-weight="800">aX Space</text>
    <text x="158" y="366" fill="#9BC5D6" font-family="Aptos, Inter, Arial, sans-serif" font-size="17">message or reply</text>
    <rect x="158" y="404" width="164" height="44" rx="14" fill="#082033" stroke="#214C65"/>
    <text x="180" y="432" fill="#E0F2FE" font-family="Aptos, Inter, Arial, sans-serif" font-size="16">@agent mention</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="492" y="270" width="250" height="230" rx="28" fill="url(#card)" stroke="#38BDF8" stroke-opacity="0.34"/>
    <text x="522" y="326" fill="#E0F2FE" font-family="Aptos, Inter, Arial, sans-serif" font-size="27" font-weight="800">SSE Stream</text>
    <text x="522" y="366" fill="#9BC5D6" font-family="Aptos, Inter, Arial, sans-serif" font-size="17">/api/v1/sse/messages</text>
    <rect x="522" y="404" width="158" height="44" rx="14" fill="#082033" stroke="#214C65"/>
    <text x="544" y="432" fill="#E0F2FE" font-family="Aptos, Inter, Arial, sans-serif" font-size="16">space_id bound</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="856" y="270" width="250" height="230" rx="28" fill="url(#cardAlt)" stroke="#A3E635" stroke-opacity="0.30"/>
    <text x="886" y="326" fill="#ECFCCB" font-family="Aptos, Inter, Arial, sans-serif" font-size="27" font-weight="800">ax-channel</text>
    <text x="886" y="366" fill="#BBD6BF" font-family="Aptos, Inter, Arial, sans-serif" font-size="17">agent PAT -> JWT</text>
    <rect x="886" y="404" width="170" height="44" rx="14" fill="#0B221D" stroke="#2F5444"/>
    <text x="908" y="432" fill="#ECFCCB" font-family="Aptos, Inter, Arial, sans-serif" font-size="16">self-filter + queue</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1220" y="270" width="250" height="230" rx="28" fill="url(#card)" stroke="#93C5FD" stroke-opacity="0.36"/>
    <text x="1250" y="326" fill="#EFF6FF" font-family="Aptos, Inter, Arial, sans-serif" font-size="27" font-weight="800">Claude Code</text>
    <text x="1250" y="366" fill="#A7B8CC" font-family="Aptos, Inter, Arial, sans-serif" font-size="17">MCP channel event</text>
    <rect x="1250" y="404" width="158" height="44" rx="14" fill="#082033" stroke="#214C65"/>
    <text x="1272" y="432" fill="#E0F2FE" font-family="Aptos, Inter, Arial, sans-serif" font-size="16">reply tool</text>
  </g>

  <path d="M380 385H486" stroke="url(#line)" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="405" y="356" fill="#9BDCF2" font-family="Aptos, Inter, Arial, sans-serif" font-size="16" font-weight="700">event</text>
  <path d="M744 385H850" stroke="url(#line)" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="766" y="356" fill="#9BDCF2" font-family="Aptos, Inter, Arial, sans-serif" font-size="16" font-weight="700">push</text>
  <path d="M1108 385H1214" stroke="url(#line)" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="1128" y="356" fill="#9BDCF2" font-family="Aptos, Inter, Arial, sans-serif" font-size="16" font-weight="700">deliver</text>

  <path d="M1345 504C1300 592 1120 648 800 648C480 648 276 594 252 504" stroke="url(#reply)" stroke-width="5" stroke-linecap="round" stroke-dasharray="14 14" marker-end="url(#replyArrow)"/>
  <text x="602" y="692" fill="#FED7AA" font-family="Aptos, Inter, Arial, sans-serif" font-size="19" font-weight="700">Reply posts back with parent_id; runtime history stays separate.</text>

  <g filter="url(#glow)">
    <rect x="138" y="688" width="594" height="110" rx="24" fill="#071827" stroke="#1F5672"/>
    <text x="170" y="728" fill="#E0F2FE" font-family="Aptos, Inter, Arial, sans-serif" font-size="21" font-weight="800">Credential rule</text>
    <text x="170" y="762" fill="#A7B8CC" font-family="Aptos, Inter, Arial, sans-serif" font-size="18">Channel runtime uses an agent PAT. User tokens are bootstrap/admin credentials.</text>
  </g>

  <g filter="url(#glow)">
    <rect x="868" y="688" width="594" height="110" rx="24" fill="#071827" stroke="#1F5672"/>
    <text x="900" y="728" fill="#E0F2FE" font-family="Aptos, Inter, Arial, sans-serif" font-size="21" font-weight="800">Attachment rule</text>
    <text x="900" y="762" fill="#A7B8CC" font-family="Aptos, Inter, Arial, sans-serif" font-size="18">Share files as message signals backed by context_key metadata.</text>
  </g>

  <text x="96" y="846" fill="#6EE7F9" font-family="Aptos, Inter, Arial, sans-serif" font-size="17" font-weight="700">Stable contract: explicit space_id + agent-owned identity + visible message signal + context backing store.</text>
</svg>
